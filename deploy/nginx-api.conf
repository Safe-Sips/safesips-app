# Terminate TLS at this layer (cert paths from Let's Encrypt or your provider).
# api.safesips.org → SafeSips presence server on :4000

upstream safesips_api {
    server safesips-server:4000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name api.safesips.org;

    ssl_certificate     /etc/letsencrypt/live/api.safesips.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.safesips.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /health {
        proxy_pass http://safesips_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://safesips_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
