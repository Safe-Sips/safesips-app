name: Deploy check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: safesips-app/package-lock.json
      - name: Install and build
        working-directory: safesips-app
        run: |
          npm ci
          npm run build
      - name: Start server and smoke test
        working-directory: safesips-app
        run: |
          npm run start:server &
          sleep 3
          node scripts/smoke-test.mjs
          node scripts/uptime-check.mjs
